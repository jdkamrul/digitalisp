name: Code Quality

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, pdo, pdo_mysql, redis, gd, zip, curl, xml, json, bcmath, intl, opcache
        coverage: none
        
    - name: Install dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader
        
    - name: Run PHPStan
      run: |
        composer require --dev phpstan/phpstan
        ./vendor/bin/phpstan analyse app --level=5 --error-format=github
        
    - name: Run PHP CS Fixer
      run: |
        composer require --dev friendsofphp/php-cs-fixer
        ./vendor/bin/php-cs-fixer fix --dry-run --diff
        
    - name: Run PHP CodeSniffer
      run: |
        composer require --dev squizlabs/php_codesniffer
        ./vendor/bin/phpcs --standard=PSR12 app/ --report=checkstyle
        
    - name: Run PHP Mess Detector
      run: |
        composer require --dev phpmd/phpmd
        ./vendor/bin/phpmd app text cleancode,codesize,controversial,design,naming,unusedcode
        
    - name: Run PHP Copy/Paste Detector
      run: |
        composer require --dev sebastian/phpcpd
        ./vendor/bin/phpcpd app/
        
    - name: Run PHP Dead Code Detector
      run: |
        composer require --dev phpstan/phpstan-deprecation-rules
        ./vendor/bin/phpstan analyse app --level=5
        
    - name: Run PHPUnit with coverage
      run: |
        ./vendor/bin/phpunit --coverage-text --coverage-html=coverage
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/clover.xml
        flags: unittests
        name: codecov-umbrella
        
    - name: Run Psalm
      run: |
        composer require --dev vimeo/psalm
        ./vendor/bin/psalm --shepherd --stats
        
    - name: Run PHP Insights
      run: |
        composer require --dev nunomaduro/phpinsights
        ./vendor/bin/phpinsights analyse app --min-quality=80 --min-complexity=80 --min-architecture=80 --min-style=80
        
    - name: Run PHPLint
      run: |
        composer require --dev oskarstark/php-lint
        ./vendor/bin/parallel-lint app/
        
    - name: Run PHPUnit tests
      run: |
        ./vendor/bin/phpunit --testdox
        
    - name: Run Infection (Mutation Testing)
      run: |
        composer require --dev infection/infection
        ./vendor/bin/infection --threads=4 --min-msi=70 --min-covered-msi=70