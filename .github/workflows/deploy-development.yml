name: Deploy to Development

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  deploy:
    name: Deploy to Development Environment
    runs-on: ubuntu-latest
    environment: development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.dev
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/radius-service:dev-${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/radius-service:dev-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Deploy to Development Server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        DEV_SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
        DEV_SERVER_USER: ${{ secrets.DEV_SERVER_USER }}
      run: |
        # Create SSH directory and set permissions
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # Deploy to development server
        ssh -o StrictHostKeyChecking=no $DEV_SERVER_USER@$DEV_SERVER_HOST << 'EOF'
          cd /opt/radius-service
          git pull origin develop
          docker-compose -f docker-compose.dev.yml down
          docker-compose -f docker-compose.dev.yml pull
          docker-compose -f docker-compose.dev.yml up -d --build
          docker system prune -f
        EOF
        
    - name: Run health check
      env:
        DEV_SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
      run: |
        echo "Waiting for services to start..."
        sleep 30
        curl -f http://$DEV_SERVER_HOST:8080/health || echo "Health check failed but continuing"
        
    - name: Send deployment notification
      if: always()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_CHANNEL: deployments
        SLACK_TITLE: "Development Deployment"
        SLACK_MESSAGE: "Deployment to development environment ${{ job.status }}"
        SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}