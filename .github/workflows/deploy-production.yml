name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - production-canary

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    concurrency: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/radius-service:prod-${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/radius-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Deploy to Production
      uses: appleboy/ssh-action@v0.1.0
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          #!/bin/bash
          set -e
          
          # Pull the latest image
          docker pull ${{ secrets.DOCKER_USERNAME }}/radius-service:prod-${{ github.sha }}
          
          # Update docker-compose.yml with new image
          cd /opt/radius-service
          docker-compose down
          docker-compose pull
          docker-compose up -d
          docker system prune -f
          
    - name: Health Check
      run: |
        sleep 30
        curl -f http://${{ secrets.PROD_HOST }}/health || exit 1
        
    - name: Notify on Success
      if: success()
      run: |
        echo "Deployment to production completed successfully!"
        
    - name: Notify on Failure
      if: failure()
      run: |
        echo "Deployment to production failed!"
        exit 1