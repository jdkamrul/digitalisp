name: CI/CD Pipeline for RADIUS Service Enhancement

on:
  push:
    branches: [ main, develop, feature/*, bugfix/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: radius_db
          MYSQL_USER: radius
          MYSQL_PASSWORD: radius123
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, pdo, pdo_mysql, redis, gd, zip, curl, xml, json, bcmath, intl, opcache, pcov
        coverage: pcov

    - name: Install PHP dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libzip-dev libpng-dev libjpeg-dev libfreetype6-dev
        sudo docker-php-ext-configure gd --with-freetype --with-jpeg
        sudo docker-php-ext-install -j zip pdo_mysql gd
        sudo pecl install redis && docker-php-ext-enable redis

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Copy environment file
      run: cp .env.example .env

    - name: Generate application key
      run: php artisan key:generate

    - name: Run PHPUnit tests
      run: |
        php artisan test --coverage-text --coverage-html=coverage
        if [ -f "phpunit.xml" ]; then
          ./vendor/bin/phpunit --coverage-text --coverage-html=coverage
        fi

    - name: Run static analysis
      run: |
        composer require --dev phpstan/phpstan
        ./vendor/bin/phpstan analyse app --level=5

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security scan
      run: |
        composer require --dev roave/security-advisories
        composer audit
        composer require --dev phpstan/phpstan
        ./vendor/bin/phpstan analyse --level=5

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: docker build -t radius-service:latest .
      
    - name: Run container tests
      run: |
        docker-compose -f docker-compose.test.yml up -d
        docker-compose -f docker-compose.test.yml run --rm app php artisan test

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [test, security-scan, build-and-test]
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
    - name: Deploy to Development
      run: |
        echo "Deploying to development environment"
        # Add deployment commands here

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security-scan, build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
    - name: Deploy to Staging
      run: |
        echo "Deploying to staging environment"
        # Add staging deployment commands

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security-scan, build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'release'
    environment: production
    steps:
    - name: Deploy to Production
      run: |
        echo "Deploying to production"
        # Add production deployment commands
